<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebArxana</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #22223a;
      --border: #333355;
      --text: #d4d4e8;
      --text-dim: #8888aa;
      --accent: #4a9eff;
      --accent-hover: #6ab4ff;
      --danger: #ff6b6b;
      --success: #51cf66;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    #app { height: 100vh; display: flex; flex-direction: column; }

    .webarxana { display: flex; flex-direction: column; height: 100vh; }

    /* Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .search-bar input {
      flex: 1;
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .search-bar button:hover { background: var(--accent-hover); }
    .status-indicator {
      font-size: 11px;
      font-family: monospace;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .status-indicator.connected { background: #1a3a1a; color: var(--success); }
    .status-indicator.disconnected { background: #3a1a1a; color: var(--danger); }
    .username {
      font-size: 12px;
      color: var(--text-dim);
      font-family: monospace;
    }

    /* Main area (sidebar + canvas) */
    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-types {
      flex: 1;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
      max-height: 40%;
    }
    .sidebar-entities {
      flex: 1;
      overflow-y: auto;
    }
    .sidebar-heading {
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .sidebar-type-item {
      padding: 4px 12px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      color: var(--text-dim);
    }
    .sidebar-type-item:hover { background: var(--card); color: var(--text); }
    .sidebar-type-item.active { background: var(--card); color: var(--accent); }
    .sidebar-entity-item {
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-entity-item:hover { background: var(--card); color: var(--accent); }
    .sidebar-toggle {
      padding: 6px 10px !important;
      background: var(--card) !important;
      font-size: 14px !important;
      min-width: 36px;
    }

    /* Canvas */
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .canvas-container svg { display: block; }

    /* Focus card overlay — docked to the right */
    .focus-card {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 340px;
      max-height: calc(100% - 24px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      z-index: 5;
      pointer-events: auto;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-type {
      font-size: 10px;
      font-family: monospace;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .card-name {
      flex: 1;
      font-weight: 600;
      font-size: 14px;
      cursor: text;
    }
    .card-name-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--text);
      padding: 2px 6px;
      font-size: 14px;
      font-weight: 600;
      outline: none;
    }
    .card-id {
      font-size: 10px;
      font-family: monospace;
      color: var(--text-dim);
    }
    .card-body {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 80px;
      max-height: 250px;
      overflow-y: auto;
      cursor: text;
      white-space: pre-wrap;
    }
    .card-body em { color: var(--text-dim); }
    .card-body-edit {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 120px;
      max-height: 250px;
      background: var(--surface);
      border: none;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      color: var(--text);
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .card-footer {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
    }
    .card-footer button {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .card-footer button:hover { border-color: var(--accent); }
    .btn-save { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .btn-cancel { color: var(--text-dim) !important; }
    .btn-new { background: var(--success) !important; color: #fff !important; border-color: var(--success) !important; }

    /* Empty state */
    .empty-graph {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 8px;
    }

    /* Login */
    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }
    .login-form h2 {
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .login-form p { color: var(--text-dim); margin-bottom: 12px; }
    .login-form input {
      width: 280px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 280px;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-form button:hover { background: var(--accent-hover); }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      background: #3a1a1a;
      padding: 6px 12px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8888aa">
      Loading WebArxana...
    </div>
  </div>
  <script src="/js/main.js"></script>
</body>
</html>
