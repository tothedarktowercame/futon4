<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebArxana</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #22223a;
      --border: #333355;
      --text: #d4d4e8;
      --text-dim: #8888aa;
      --accent: #4a9eff;
      --accent-hover: #6ab4ff;
      --danger: #ff6b6b;
      --success: #51cf66;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    #app { height: 100vh; display: flex; flex-direction: column; }

    .webarxana { display: flex; flex-direction: column; height: 100vh; }

    /* Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .search-bar input {
      flex: 1;
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .search-bar button:hover { background: var(--accent-hover); }
    .diagram-save-inline {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hop-btn.saved { color: var(--success) !important; }
    .diagram-save-inline input {
      width: 140px;
      padding: 4px 8px;
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .status-indicator {
      font-size: 11px;
      font-family: monospace;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .status-indicator.connected { background: #1a3a1a; color: var(--success); }
    .status-indicator.disconnected { background: #3a1a1a; color: var(--danger); }
    .username {
      font-size: 12px;
      color: var(--text-dim);
      font-family: monospace;
    }

    /* Main area (sidebar + canvas) */
    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-types {
      flex: 1;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
      max-height: 40%;
    }
    .sidebar-entities {
      flex: 1;
      overflow-y: auto;
    }
    .sidebar-heading {
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .sidebar-type-item {
      padding: 4px 12px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      color: var(--text-dim);
    }
    .sidebar-type-item:hover { background: var(--card); color: var(--text); }
    .sidebar-type-item.active { background: var(--card); color: var(--accent); }
    .sidebar-entity-item {
      padding: 5px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sidebar-entity-item .entity-name {
      flex: 1;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-entity-item .entity-name:hover { color: var(--accent); }
    .pin-btn {
      background: none !important;
      border: none !important;
      color: var(--text-dim) !important;
      font-size: 12px !important;
      cursor: pointer;
      padding: 0 4px !important;
      flex-shrink: 0;
    }
    .pin-btn:hover { color: var(--success) !important; }
    .entity-type-badge {
      font-size: 9px;
      font-family: monospace;
      color: var(--text-dim);
      padding: 1px 4px;
      background: var(--bg);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .sidebar-recent { border-bottom: 1px solid var(--border); max-height: 30%; overflow-y: auto; }
    /* Scratchpad */
    .sidebar-scratchpad {
      border-bottom: 1px solid var(--border);
    }
    .scratchpad-item {
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .scratchpad-name {
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scratchpad-name em { color: var(--text-dim); }
    .scratchpad-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .scratchpad-btn {
      padding: 2px 8px;
      font-size: 11px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      cursor: pointer;
    }
    .scratchpad-btn:hover { border-color: var(--accent); color: var(--text); }
    .scratchpad-btn.connecting-active {
      background: #2a2a1a !important;
      border-color: #ffd43b !important;
      color: #ffd43b !important;
    }
    .connect-banner {
      padding: 8px 12px;
      background: #2a2a1a;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #ffd43b;
    }

    .sidebar-toggle {
      padding: 6px 10px !important;
      background: var(--card) !important;
      font-size: 14px !important;
      min-width: 36px;
    }

    /* Canvas */
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .canvas-container svg { display: block; }

    /* Stacked pin cards on the right */
    .pin-cards {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 340px;
      max-height: calc(100% - 16px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 5;
      pointer-events: auto;
    }
    .focus-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      z-index: 5;
      pointer-events: auto;
    }
    .focus-card.active-pin { border-color: var(--accent); }
    .focus-card .card-body { max-height: 150px; }
    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-type {
      font-size: 10px;
      font-family: monospace;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .card-name {
      flex: 1;
      font-weight: 600;
      font-size: 14px;
      cursor: text;
    }
    .card-name-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--text);
      padding: 2px 6px;
      font-size: 14px;
      font-weight: 600;
      outline: none;
    }
    .card-id {
      font-size: 10px;
      font-family: monospace;
      color: var(--text-dim);
    }
    .card-authors {
      font-size: 10px;
      font-family: monospace;
      color: var(--accent);
      margin-left: auto;
    }
    .card-body {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 80px;
      max-height: 250px;
      overflow-y: auto;
      cursor: text;
      white-space: pre-wrap;
    }
    .card-body em { color: var(--text-dim); }
    .card-body-edit {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 120px;
      max-height: 250px;
      background: var(--surface);
      border: none;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      color: var(--text);
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .card-footer {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
    }
    .card-footer button {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .card-footer button:hover { border-color: var(--accent); }
    .btn-save { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .btn-cancel { color: var(--text-dim) !important; }
    .btn-new { background: var(--success) !important; color: #fff !important; border-color: var(--success) !important; }

    /* New node button */
    .btn-new-node {
      padding: 6px 12px !important;
      background: var(--success) !important;
      font-size: 16px !important;
      font-weight: bold;
      min-width: 36px;
      border: none !important;
    }
    .btn-new-node:hover { opacity: 0.85; }

    /* Hop depth controls */
    .hop-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: 4px;
    }
    .hop-btn {
      padding: 4px 8px !important;
      background: var(--card) !important;
      font-size: 14px !important;
      min-width: 28px;
      text-align: center;
    }
    .hop-label {
      font-size: 11px;
      font-family: monospace;
      color: var(--text-dim);
      padding: 0 4px;
      min-width: 32px;
      text-align: center;
    }

    /* Creation dialog */
    .creation-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .creation-dialog {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .creation-header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .creation-field {
      margin-bottom: 12px;
    }
    .creation-field label {
      display: block;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .creation-field input,
    .creation-field select {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .creation-field input:focus,
    .creation-field select:focus { border-color: var(--accent); }
    .creation-field select { cursor: pointer; }
    .creation-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .creation-actions .btn-create {
      flex: 1;
      padding: 8px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .creation-actions .btn-create:hover { background: var(--accent-hover); }
    .creation-actions .btn-cancel {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
    }

    /* Scratch card — floats top-left */
    .scratch-card {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 340px;
      max-height: calc(100% - 24px);
      background: var(--card);
      border: 1px solid var(--success);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      z-index: 5;
      pointer-events: auto;
    }
    .scratch-card .card-header { border-bottom: 1px solid var(--border); }
    .scratch-card .card-body-edit { min-height: 100px; }
    .card-type-input {
      width: 100px;
      padding: 2px 6px;
      font-size: 10px;
      font-family: monospace;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--text);
      text-transform: uppercase;
      outline: none;
    }
    .scratch-dismiss {
      background: none !important;
      border: none !important;
      color: var(--text-dim) !important;
      font-size: 18px !important;
      cursor: pointer;
      padding: 0 4px !important;
    }
    .scratch-dismiss:hover { color: var(--danger) !important; }

    /* Link editor popup */
    .link-editor-popup {
      position: fixed;
      z-index: 50;
      background: var(--card);
      border: 1px solid #ffd43b;
      border-radius: 6px;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 200px;
      transform: translate(-50%, -100%);
      margin-top: -8px;
    }
    .link-editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .link-editor-body label {
      display: block;
      font-size: 10px;
      font-family: monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .link-editor-body select {
      width: 100%;
      padding: 6px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
    }
    .link-editor-text {
      width: 100%;
      padding: 6px 8px;
      margin-top: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      min-height: 50px;
      resize: vertical;
      outline: none;
    }
    .link-editor-text:focus { border-color: var(--accent); }
    .link-editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .link-editor-actions .btn-save { flex-shrink: 0; }
    .link-editor-info {
      margin-top: 6px;
    }

    /* Empty state */
    .empty-graph {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 8px;
    }

    /* Login */
    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }
    .login-form h2 {
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .login-form p { color: var(--text-dim); margin-bottom: 12px; }
    .login-form input {
      width: 280px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 280px;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-form button:hover { background: var(--accent-hover); }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      background: #3a1a1a;
      padding: 6px 12px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8888aa">
      Loading WebArxana...
    </div>
  </div>
  <script>
    // Bundle picker: a `#/dev/...` route loads the in-JVM shadow WATCH bundle
    // (/js/main.js, carries the hot-reload client) so CLJS edits hot-reload
    // live; any other route loads the static compile bundle (/wa/wa.js). The
    // hash is available at parse time, so this runs before either bundle loads.
    // route.cljs strips the leading `dev` segment, so `#/dev/diagram/X/expanded`
    // routes exactly like `#/diagram/X/expanded`, just hot-reloadable.
    (function () {
      var dev = /^#\/?dev(\/|$)/.test(window.location.hash || "");
      var s = document.createElement("script");
      s.src = dev ? "/wa/dev/main.js" : "/wa/wa.js";
      (document.body || document.head).appendChild(s);
    })();
  </script>
</body>
</html>
